<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dettaglio Ricetta — MealExplorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dettaglio.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🍽</span>
        <span class="logo-text">MealExplorer</span>
      </div>
      <button class="btn-back" id="btnBack">← Torna alla lista</button>
    </div>
  </header>

  <!-- STATO LOADING -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Caricamento ricetta...</p>
  </div>

  <!-- STATO ERRORE -->
  <div class="error-state hidden" id="errorState">
    <span class="error-icon">⚠️</span>
    <p id="errorMessage">Ricetta non trovata.</p>
    <button id="retryBtn" onclick="window.location.href='index.html'">
      Torna alla home
    </button>
  </div>

  <!-- CONTENUTO DETTAGLIO -->
  <main class="dettaglio-main hidden" id="dettaglioMain">

    <!-- HERO: immagine + info principali -->
    <section class="dettaglio-hero">
      <div class="hero-img-wrapper">
        <img id="heroImg" src="" alt="" />
        <div class="hero-img-overlay"></div>
      </div>

      <div class="hero-info">
        <div class="hero-badges" id="heroBadges">
          <!-- categoria + paese popolati da JS -->
        </div>

        <h1 class="hero-title" id="heroTitolo"></h1>

        <div class="hero-meta" id="heroMeta">
          <!-- bandiera + paese + n. ingredienti -->
        </div>

        <div class="hero-tags" id="heroTags">
          <!-- tag popolati da JS -->
        </div>

        <!-- AZIONI DB -->
        <div class="hero-actions">
          <button class="btn-salva" id="btnSalva">
            💾 Salva nel DB
          </button>
          <button class="btn-elimina hidden" id="btnElimina">
            🗑 Elimina dal DB
          </button>
          <a class="btn-fonte hidden" id="btnFonte" target="_blank">
            🔗 Fonte originale
          </a>
        </div>
      </div>
    </section>

    <!-- CORPO: ingredienti + preparazione + video -->
    <section class="dettaglio-corpo">

      <!-- COLONNA SX: ingredienti -->
      <aside class="dettaglio-ingredienti">
        <h2 class="sezione-titolo">📋 Ingredienti</h2>
        <ul class="ingredienti-lista" id="ingredientiLista">
          <!-- popolata da JS -->
        </ul>
      </aside>

      <!-- COLONNA DX: preparazione + video -->
      <div class="dettaglio-contenuto">

        <div class="sezione-preparazione">
          <h2 class="sezione-titolo">📖 Preparazione</h2>
          <div class="istruzioni-testo" id="istruzioniTesto">
            <!-- paragrafi popolati da JS -->
          </div>
        </div>

        <!-- VIDEO (mostrato solo se disponibile) -->
        <div class="sezione-video hidden" id="sezioneVideo">
          <h2 class="sezione-titolo">📺 Video Tutorial</h2>
          <div class="video-wrapper">
            <iframe
              id="videoFrame"
              src=""
              title="Video ricetta"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write;
                     encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Dati forniti da
      <a href="https://www.themealdb.com" target="_blank">TheMealDB</a>
      · MealExplorer 2025
    </p>
  </footer>

  <!-- SCRIPTS -->
  <script src="classi/Ricetta.js"></script>
  <script src="classi/FiltroRicerca.js"></script>
  <script src="utils/helpers.js"></script>
  <script src="services/apiService.js"></script>
  <script src="services/dbService.js"></script>
  <script src="controllers/controllerRicette.js"></script>
  <script src="controllers/controllerDettaglio.js"></script>

</body>
</html>
